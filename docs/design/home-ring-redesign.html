<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>悦己充盈环 · 配色方案探索（扫掠尾迹 + 充盈光晕）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2EEE6; --ink:#2A2622; --sub:#6B6358; --muted:#9A9082; --line:#E2DACd;
    --card:#FFFFFF; --screen:#ECE6DA; --bezel:#1d1c1a; --track:#E9F0F0;
    --paper-accent:#0E9AA7;
  }
  body.dark{
    --bg:#13181A; --ink:#ECEFEF; --sub:#A6B2B4; --muted:#6E7C7E; --line:#26343a;
    --card:#1A282E; --screen:#0E1416; --bezel:#000000; --track:#22343A;
    --paper-accent:#3FC2CE;
  }
  *{box-sizing:border-box}
  body{margin:0;background:
      radial-gradient(120% 80% at 12% -10%, color-mix(in oklab, var(--paper-accent) 9%, transparent), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,"Segoe UI",sans-serif;
    transition:background .3s,color .3s;}
  .wrap{max-width:1320px;margin:0 auto;padding:44px 30px 90px;}
  .top{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:6px}
  h1{font-family:"Fraunces",Georgia,serif;font-weight:700;font-size:34px;line-height:1.1;margin:0;letter-spacing:-.5px}
  h1 em{font-style:italic;color:var(--paper-accent)}
  .lede{color:var(--sub);font-size:14.5px;line-height:1.6;max-width:780px;margin:12px 0 0}
  .lede b{color:var(--ink)}
  .toggle{flex:none;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    border-radius:999px;padding:9px 16px;cursor:pointer;color:var(--ink);font-size:13px;font-weight:600}

  .scheme{margin-top:42px}
  .scheme-head{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  .scheme-head h2{font-family:"Fraunces",serif;font-weight:700;font-size:21px;margin:0}
  .scheme-head h2 b{color:var(--paper-accent);font-weight:700}
  .swatches{display:flex;gap:8px;flex-wrap:wrap}
  .sw{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 11px 5px 6px;font-size:12px;color:var(--sub)}
  .sw i{width:16px;height:16px;border-radius:50%;display:block}
  .sw b{color:var(--ink);font-weight:600}
  .sw code{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:var(--muted)}
  .scheme-note{flex-basis:100%;font-size:13px;color:var(--sub);line-height:1.55;margin:2px 0 0}
  .pair{display:flex;gap:24px;flex-wrap:wrap}

  .phone{width:340px;background:var(--bezel);border-radius:44px;padding:10px;box-shadow:0 24px 50px -20px rgba(20,40,44,.45),0 4px 12px rgba(0,0,0,.15)}
  .screen{background:var(--screen);border-radius:34px;padding:14px 13px 18px;overflow:hidden;position:relative}
  .statusbar{display:flex;justify-content:space-between;align-items:center;padding:2px 8px 12px;font-size:12px;color:var(--sub);font-weight:600}
  .statusbar .dots{display:flex;gap:3px}
  .statusbar .dots i{width:5px;height:5px;border-radius:50%;background:var(--muted);display:block}
  .vname{font-family:"Fraunces",serif;font-weight:700;font-size:14px;margin:0 4px 10px;color:var(--ink);display:flex;align-items:baseline;gap:7px}
  .vname small{font-family:"PingFang SC",sans-serif;font-weight:600;font-size:11px;color:var(--paper-accent);letter-spacing:.3px}
  .hero{background:var(--card);border-radius:20px;padding:16px 15px;box-shadow:0 2px 10px rgba(20,40,44,.05)}
  .hero .htitle{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:12px}
  .hero .htitle .info{margin-left:auto;width:15px;height:15px;border-radius:50%;border:1.4px solid var(--muted);color:var(--muted);font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700}
  .ringrow{display:flex;align-items:center;gap:14px}
  .ringwrap{position:relative;width:128px;height:128px;flex:none}
  .ringwrap .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
  .ringwrap .ctr .v{font-size:12px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.4px}
  .ringwrap .ctr .l{font-size:8px;color:var(--muted);margin-top:1px}
  .legend{display:flex;flex-direction:column;gap:9px;flex:1}
  .legend .row{display:flex;align-items:center;gap:7px;font-size:12.5px}
  .legend .row .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .legend .row .lab{color:var(--sub);font-weight:600;white-space:nowrap}
  .legend .row .val{margin-left:auto;color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}

  footer{margin-top:56px;border-top:1px solid var(--line);padding-top:22px;color:var(--muted);font-size:12.5px;line-height:1.7}
  footer b{color:var(--sub)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>青瓷 · 薰衣草 · 浅金 · <em>金环位置对比</em></h1>
      <p class="lede">就你选的 <b>H 青瓷·薰衣草·浅金</b>，试把 <b>浅金</b> 从内环挪到<b>中环</b>。三色不变，只换它们的内/中/外位置。
      关键：<b>圆心「悦己指数」颜色 = 内环色</b>，所以金移走后圆心数字会变色（薰衣草偏浅，已加深保证可读）。各 ②/⑥ 两版对照。</p>
    </div>
    <button class="toggle" onclick="document.body.classList.toggle('dark');render()">◐ 深 / 浅色</button>
  </div>

  <div id="root"></div>

  <footer>
    三色映射：外环 <b>小确幸</b> · 中环 <b>满足度</b> · 内环 <b>悦己目标</b>（= 圆心悦己指数色）。
    三环相切无间距、圆头端点、OKLCH 环内插值；三色按<b>色相 + 明度</b>双重拉开 → 既解决"中外环太近"，也过色盲与小尺寸。
    Pencil 当前环境无法落盘（D-03b），故以可入库的 HTML/SVG 交付，已按真机尺寸 + 手机外框呈现。
  </footer>
</div>

<script>
/* ---- OKLab interpolation ---- */
function hex2rgb(h){if(h[0]!=='#'){const m=h.match(/\d+(\.\d+)?/g);return [m[0],m[1],m[2]].map(v=>(+v)/255);}h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)].map(v=>v/255);}
const s2l=c=>c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);
const l2s=c=>c<=0.0031308?12.92*c:1.055*Math.pow(c,1/2.4)-0.055;
function rgb2oklab([r,g,b]){r=s2l(r);g=s2l(g);b=s2l(b);
  const l=Math.cbrt(0.4122214708*r+0.5363325363*g+0.0514459929*b);
  const m=Math.cbrt(0.2119034982*r+0.6806995451*g+0.1073969566*b);
  const s=Math.cbrt(0.0883024619*r+0.2817188376*g+0.6299787005*b);
  return [0.2104542553*l+0.7936177850*m-0.0040720468*s,1.9779984951*l-2.4285922050*m+0.4505937099*s,0.0259040371*l+0.7827717662*m-0.8086757660*s];}
function oklab2rgb([L,a,b]){const l=(L+0.3963377774*a+0.2158037573*b)**3,m=(L-0.1055613458*a-0.0638541728*b)**3,s=(L-0.0894841775*a-1.2914855480*b)**3;
  return [4.0767416621*l-3.3077115913*m+0.2309699292*s,-1.2684380046*l+2.6097574011*m-0.3413193965*s,-0.0041960863*l-0.7034186147*m+1.7076147010*s].map(c=>Math.round(Math.max(0,Math.min(1,l2s(c)))*255));}
function mix(h1,h2,t){const a=rgb2oklab(hex2rgb(h1)),b=rgb2oklab(hex2rgb(h2));const [r,g,bb]=oklab2rgb([a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t]);return `rgb(${r},${g},${bb})`;}
const lighten=(h,t)=>mix(h,'#ffffff',t);

/* ---- geometry ---- */
function pt(cx,cy,r,a){const t=a*Math.PI/180;return [cx+r*Math.sin(t),cy-r*Math.cos(t)];}
function arcD(cx,cy,r,a0,a1){const [x0,y0]=pt(cx,cy,r,a0),[x1,y1]=pt(cx,cy,r,a1);const large=Math.abs(a1-a0)>180?1:0,sweep=a1>a0?1:0;return `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${large} ${sweep} ${x1.toFixed(2)} ${y1.toFixed(2)}`;}
const trackC=(cx,cy,r,col,w)=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="${w}"/>`;
const solidArc=(cx,cy,r,prog,col,w)=>`<path d="${arcD(cx,cy,r,0,prog*360-0.01)}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="round"/>`;
function sweepArc(cx,cy,r,prog,cTail,cHead,w,fade){
  const total=prog*360; if(total<=0.5) return '';
  const N=Math.max(3,Math.ceil(total/9)); let s='';
  for(let i=0;i<N;i++){const t1=(i+1)/N;const a0=(i/N)*total;const a1=t1*total+0.8;const col=mix(cTail,cHead,t1);const op=fade?(0.44+0.56*t1).toFixed(2):1;
    s+=`<path d="${arcD(cx,cy,r,a0,a1)}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="butt" opacity="${op}"/>`;}
  const [hx,hy]=pt(cx,cy,r,total);s+=`<circle cx="${hx.toFixed(1)}" cy="${hy.toFixed(1)}" r="${(w/2).toFixed(1)}" fill="${cHead}"/>`;
  if(!fade){const [sx,sy]=pt(cx,cy,r,0);s+=`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${(w/2).toFixed(1)}" fill="${cTail}"/>`;}
  return s;}

const GEO={box:128,cx:64,cy:64,w:13,radii:[51,38,25]}; // touching, no gap
const MET=[{label:'小确幸',val:'7',p:.70},{label:'满足度',val:'8.4',p:.84},{label:'悦己目标',val:'62%',p:.62}];

function renderRing(style,deeps,track,uid){
  const {cx,cy,w,radii,box}=GEO; let body='';
  radii.forEach((r,i)=>{body+=trackC(cx,cy,r,track,w);});
  radii.forEach((r,i)=>{const deep=deeps[i],p=MET[i].p;
    if(style==='comet'){ body+=sweepArc(cx,cy,r,p,lighten(deep,.32),deep,w,true); }
    else { body+=`<g filter="url(#g${uid}_${i})" opacity="0.55">${solidArc(cx,cy,r,p,deep,w)}</g>`+sweepArc(cx,cy,r,p,lighten(deep,.22),deep,w,false); }
  });
  const filter=style==='glow'?`<defs>${radii.map((_,i)=>`<filter id="g${uid}_${i}" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.2"/></filter>`).join('')}</defs>`:'';
  return `<svg width="${box}" height="${box}" viewBox="0 0 ${box} ${box}">${filter}${body}</svg>`;
}

/* ---- 方案 H「青瓷·薰衣草·浅金」金环位置对比 ----
   三色固定（青 #3BBDB8 / 薰衣草 #9D9CE6 / 浅金 #F0C04E），变的是它们落在 外/中/内 哪一环。
   注意：圆心「悦己指数」颜色 = 内环色，所以金移走会改变圆心数字的颜色。*/
const SCHEMES=[
  {id:'H',name:'原版 · 金在内环',en:'GOLD = INNER (current)',hex:['#3BBDB8','#9D9CE6','#F0C04E'],dark:['#4FD3CE','#B4B2F2','#F5CE6A'],
   note:'外青 · 中薰衣草 · 内浅金。圆心悦己指数 = 金，最暖、最像"目标达成"的高光时刻。'},
  {id:'H₂',name:'金在中环 · 内薰衣草',en:'GOLD = MIDDLE / VIOLET INNER',hex:['#3BBDB8','#F0C04E','#9D9CE6'],dark:['#4FD3CE','#F5CE6A','#B4B2F2'],
   note:'外青 · 中浅金 · 内薰衣草。金移到中环（满足度），暖色居中更聚焦；圆心指数 = 薰衣草（已加深保证可读）。'},
  {id:'H₃',name:'金在中环 · 内青',en:'GOLD = MIDDLE / TEAL INNER',hex:['#9D9CE6','#F0C04E','#3BBDB8'],dark:['#B4B2F2','#F5CE6A','#4FD3CE'],
   note:'外薰衣草 · 中浅金 · 内青。金做暖核居中；圆心指数 = 品牌青，最易读、最稳，与全局色最统一。'},
];
function deepsFor(s,dark){return dark?(s.dark||s.hex.map(h=>lighten(h,.26))):s.hex;}

let UID=0;
function phone(style,scheme,c){
  const deeps=deepsFor(scheme,c.dark);
  const uid=UID++; const ring=renderRing(style,deeps,c.track,uid);
  const styleName=style==='comet'?'② 扫掠尾迹':'⑥ 充盈光晕';
  const styleEn=style==='comet'?'COMET SWEEP':'INNER GLOW';
  const legend=MET.map((m,i)=>`<div class="row"><span class="dot" style="background:${deeps[i]}"></span><span class="lab">${m.label}</span><span class="val">${m.val}</span></div>`).join('');
  return `<div class="phone"><div class="screen">
    <div class="statusbar"><span>9:41</span><span class="dots"><i></i><i></i><i></i></span></div>
    <div class="vname">${styleName}<small>${styleEn}</small></div>
    <div class="hero"><div class="htitle">✨ 悦己充盈<span class="info">i</span></div>
      <div class="ringrow">
        <div class="ringwrap">${ring}<div class="ctr"><span class="v" style="color:${c.dark?deeps[2]:mix(deeps[2],'#202020',.36)}">¥12,400</span><span class="l">悦己指数</span></div></div>
        <div class="legend">${legend}</div>
      </div></div>
  </div></div>`;
}

function render(){
  const dark=document.body.classList.contains('dark');
  const c={dark, track:dark?'#22343A':'#E9F0F0'};
  UID=0;
  const root=document.getElementById('root'); root.innerHTML='';
  SCHEMES.forEach(sc=>{
    const dd=deepsFor(sc,dark);
    const sw=sc.hex.map((h,i)=>`<span class="sw"><i style="background:${dd[i]}"></i><b>${MET[i].label}</b><code>${dark?dd[i]:h}</code></span>`).join('');
    const sec=document.createElement('section'); sec.className='scheme';
    sec.innerHTML=`<div class="scheme-head"><h2><b>${sc.id}</b> · ${sc.name} <span style="font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:14px;color:var(--muted)">${sc.en}</span></h2>
      <div class="swatches">${sw}</div><p class="scheme-note">${sc.note}</p></div>
      <div class="pair">${phone('comet',sc,c)}${phone('glow',sc,c)}</div>`;
    root.appendChild(sec);
  });
}
render();
</script>
</body>
</html>
