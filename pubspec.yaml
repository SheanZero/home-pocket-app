name: home_pocket
description: "Local-first, privacy-focused family accounting app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Immutable Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Cryptography
  cryptography: ^2.7.0
  crypto: ^3.0.6

  # Secure Storage
  flutter_secure_storage: ^10.2.0

  # Biometric Authentication
  local_auth: ^3.0.1

  # Unique ID Generation
  table_calendar: ^3.2.0
  ulid: ^2.0.0

  # Voice Input
  speech_to_text: ^7.0.0

  # Charts
  fl_chart: ^1.2.0

  # Settings & Preferences
  shared_preferences: ^2.3.4

  # File Operations
  file_picker: ^11.0.2
  image_picker: ^1.1.2
  share_plus: ^12.0.2
  package_info_plus: ^9.0.1

  # External URL launching (privacy/terms hosted URLs + sponsor link).
  # url_launcher_windows has no win32 dep → safe with the pinned win32 trio above.
  url_launcher: ^6.3.2

  # Firebase & Notifications
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.1
  flutter_local_notifications: ^21.0.0

  # Database
  drift: ^2.25.0
  sqlcipher_flutter_libs: ^0.6.7
  sqlite3: ^2.7.5
  path_provider: ^2.1.5
  path: ^1.9.1
  pinenacl: ^0.6.0
  http: ^1.6.0
  uuid: ^4.5.3
  qr_flutter: ^4.1.0
  lucide_icons_flutter: ^3.1.14
  web_socket_channel: ^3.0.0
  connectivity_plus: ^7.1.1
  collection: ^1.19.1
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Flutter SDK package (no pub.dev fetch) — drives the on-device/simulator
  # encrypted-executor migration ladder (integration_test/). SQLCipher natives
  # only load on a real device/sim; host `flutter test` links plain libsqlite3.
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  drift_dev: ^2.25.0

  # Testing
  fake_async: ^1.3.3
  mocktail: ^1.0.4
  # Transitive via url_launcher (56-01); referenced directly to mock
  # UrlLauncherPlatform.instance in the sponsor-launch widget test (56-05).
  plugin_platform_interface: ^2.1.8
  url_launcher_platform_interface: ^2.3.2

  # Audit Tooling
  import_guard_custom_lint: ^1.0.0
  dart_code_linter: ^3.0.0

  # Architecture Tests
  yaml: ^3.1.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/satisfaction/
    - assets/legal/
