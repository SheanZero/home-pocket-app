# Permanent gate — do not weaken without ADR amendment.
# See docs/arch/03-adr/ADR-011_Codebase_Cleanup_Initiative_Outcome.md.
# Phase 8 D-05: the four guardrails below (import_guard / custom_lint /
# coverde per-file >=70% / sqlite3_flutter_libs reject) are blocking on
# every PR + push to main. The coverage job intentionally has no PR-only
# guard, and every guardrail step is hard-failing by design.
# Threshold history: 80% (Phase 2 BASE-06) → 70% (Phase 8 amendment 2026-04-28,
# user directive: post-cleanup coverage 74.6% short of 80%; raise revisited after
# v1 feature work completes — see backlog ID coverage-baseline-review).

name: audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-${{ hashFiles('pubspec.lock') }}
      - run: flutter pub get
      - run: dart pub global activate coverde 0.3.0+1
      - name: Verify analyzer pin (smoke check)
        run: |
          if grep -A 1 '^  analyzer:' pubspec.lock | grep -q 'version: "7'; then
            echo "analyzer 7.x confirmed"
          else
            echo "::warning::analyzer pin moved off 7.x — verify FUTURE-TOOL-01 readiness"
          fi
      - name: flutter analyze
        run: flutter analyze --no-fatal-infos
      - name: dart run custom_lint
        # Made blocking at Phase 3 close per D-17 (previously non-blocking)
        run: dart run custom_lint
      - name: Audit scanners
        run: |
          bash scripts/audit_layer.sh
          bash scripts/audit_dead_code.sh
          bash scripts/audit_providers.sh
          bash scripts/audit_duplication.sh
      - name: Merge findings
        run: dart run scripts/merge_findings.dart
      - uses: actions/upload-artifact@v4
        with:
          name: audit-issues
          path: |
            .planning/audit/issues.json
            .planning/audit/ISSUES.md
            .planning/audit/shards/*.json
            .planning/audit/agent-shards/*.json

  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - run: flutter pub get

      # AUDIT-09 — sqlite3_flutter_libs reject. BLOCKING from end of Phase 1.
      - name: Reject sqlite3_flutter_libs in pubspec.lock
        run: |
          if grep -q sqlite3_flutter_libs pubspec.lock; then
            echo "::error::sqlite3_flutter_libs detected in pubspec.lock — conflicts with sqlcipher_flutter_libs"
            exit 1
          fi

      # AUDIT-10 — build_runner stale-diff. BLOCKING from end of Phase 1.
      - name: Build runner clean diff
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs
          if ! git diff --exit-code lib/; then
            echo "::error::Generated files in lib/ are stale — run build_runner locally and commit"
            exit 1
          fi

  coverage:
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - run: flutter pub get
      - run: dart pub global activate coverde 0.3.0+1
      - run: flutter test --coverage
      - name: Strip generated files from lcov
        run: |
          coverde filter \
            --input coverage/lcov.info \
            --output coverage/lcov_clean.info \
            --mode w \
            --filters '\.g\.dart$,\.freezed\.dart$,\.mocks\.dart$,^lib/generated/'
      - name: Per-file coverage gate
        run: dart run scripts/coverage_gate.dart --list .planning/audit/cleanup-touched-files.txt --threshold 70 --lcov coverage/lcov_clean.info
      - uses: VeryGoodOpenSource/very_good_coverage@v2
        # Phase 2 close (BASE-06 / D-05): blocking. Threshold 80 → 70 (Phase 8 amendment 2026-04-28).
        with:
          path: coverage/lcov_clean.info   # Phase 2 BASE-02: cleaned by coverde filter upstream
          min_coverage: 70
          exclude: |
            **/*.g.dart
            **/*.freezed.dart
            **/*.mocks.dart
            lib/generated/**
      - name: Generate coverage baseline artifacts
        run: dart run scripts/coverage_baseline.dart
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-baseline
          path: |
            .planning/audit/coverage-baseline.txt
            .planning/audit/coverage-baseline.json
            .planning/audit/files-needing-tests.txt
            .planning/audit/files-needing-tests.json
