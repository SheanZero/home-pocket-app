# Presentation layer — shopping_list feature.
# Intentional cross-feature dependency (ITEM-03): shopping_item_form_screen imports
# accounting's CategorySelectionScreen (it carries accounting-specific providers and
# cannot move to shared/ without dragging those providers along). This presentation→
# presentation import is NOT denied by any inherited rule, so no allow entry is needed.
# NOTE: do NOT add an `allow:` block here — import_guard treats any allow entry as
# whitelist mode (deny everything not listed), which would reject flutter/riverpod/etc.
deny:
  - package:home_pocket/infrastructure/**
  - package:home_pocket/data/daos/**
  - package:home_pocket/data/tables/**

inherit: true
